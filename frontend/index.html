<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentP - AI Agents Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark-theme">

    <div class="app-wrapper">
        
        <!-- ה-Mini Dock האנכי -->
        <nav class="mini-dock">
            <div class="dock-top-group">
                <!-- כוכב ניאון זוהר בראש -->
                <button class="dock-item brand-spark animate-breath" id="dock-spark-btn" title="AgentP Core">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L14.8 9.2L22 12L14.8 14.8L12 22L9.2 14.8L2 12L9.2 9.2L12 2Z" fill="url(#spark-grad)"/>
                        <defs>
                            <linearGradient id="spark-grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#ff5500" />
                                <stop offset="50%" stop-color="#ffb703" />
                                <stop offset="100%" stop-color="#38bdf8" />
                            </linearGradient>
                        </defs>
                    </svg>
                </button>
                
                <!-- כפתור עריכה/שיחה חדשה מהירה -->
                <button class="dock-item" id="dock-new-chat-btn" title="שיחה חדשה / New Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                
                <!-- כפתור חיפוש ופתיחת/סגירת סיידבר -->
                <button class="dock-item" id="dock-search-btn" title="חיפוש והיסטוריה / Search & History">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>

                <!-- כפתור סטטיסטיקות סוכן ומצב -->
                <button class="dock-item" id="dock-stats-btn" title="נתוני סוכן / Agent Analytics">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"></path><path d="M12 6V12L16 14"></path></svg>
                </button>
            </div>
            
            <div class="dock-bottom-group">
                <!-- כפתור ניקוי מהיר של כל השיחות במכה -->
                <button class="dock-item btn-dock-danger" id="dock-clear-btn" title="ארכיב וניקוי / Archive & Clear">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
        </nav>
        
        <!-- סרגל צד (Sidebar) - בדיפולט סגור (collapsed) -->
        <aside class="sidebar collapsed" id="sidebar-panel">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="perry-head animate-breath">
                        <div class="hair-tuft"></div>
                        <div class="fedora">
                            <div class="fedora-top"></div>
                            <div class="fedora-brim"></div>
                        </div>
                        <div class="eyes-container">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="bill"></div>
                    </div>
                    <div class="logo">
                        <span class="logo-accent">Agent</span><span class="logo-p">P</span>
                    </div>
                </div>
            </div>

            <button class="new-chat-btn" id="new-chat-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                <span id="txt-new-chat">שיחה חדשה</span>
            </button>

            <!-- תיבת חיפוש שיחות דינמית -->
            <div class="search-box-container">
                <div class="search-input-wrapper">
                    <svg class="search-box-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="sidebar-search-input" placeholder="חפש שיחה..." autocomplete="off">
                </div>
            </div>

            <div class="history-section">
                <div class="history-label" id="txt-recent-chats">שיחות אחרונות</div>
                <div class="history-list" id="history-list"></div>
            </div>
        </aside>

        <!-- מסך הצ'אט המרכזי -->
        <main class="chat-container">
            <div class="model-selector-container">
                <div class="selector-wrapper">
                    <label for="model-select" id="txt-active-engine">מנוע אקטיבי:</label>
                    <select id="model-select">
                        <option value="openai" id="opt-openai">OpenAI (ענן - GPT-4o-mini)</option>
                        <option value="local" id="opt-local">Ollama (מקומי - Gemma4)</option>
                    </select>
                </div>
                
                <div class="header-actions">
                    <button id="lang-toggle-btn" class="theme-toggle-btn" title="Change Language / החלף שפה">
                        <span style="font-weight: 700; font-size: 12px; letter-spacing: 0.5px;">EN/עב</span>
                    </button>

                    <button id="theme-toggle-btn" class="theme-toggle-btn" title="החלף מצב תצוגה">
                        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>
                        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>

                    <div class="agent-status-badge" id="txt-status-badge">
                        <span class="status-dot animate-pulse"></span>
                        סוכן אוטונומי • מחובר
                    </div>
                </div>
            </div>

            <!-- זרם הודעות -->
            <div class="chat-messages" id="chat-messages"></div>

            <!-- תיבת קלט ניידת מעוצבת וחדשנית עם תמיכה ב-RAG -->
            <div class="chat-input-container">
                <div id="file-preview-bar" class="file-preview-bar"></div>

                <form id="chat-form" class="modern-input-group">
                    <div class="input-actions-left">
                        <button type="button" id="attach-btn" class="attach-btn" title="הוסף קובץ">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </button>
                        <div id="upload-menu" class="floating-upload-menu">
                            <div class="menu-item" onclick="document.getElementById('file-input').click()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                <span>העלה מסמכים (PDF/Word)</span>
                            </div>
                            <div class="menu-divider"></div>
                            <div class="menu-item disabled">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                <span>תמונות (בקרוב)</span>
                            </div>
                        </div>
                    </div>

                    <textarea id="user-input" placeholder="שאל את הסוכן או בקש חיפוש... (Enter לשליחה)" rows="1" autocomplete="off" required></textarea>
                    
                    <input type="file" id="file-input" multiple hidden accept=".pdf,.docx,.doc">

                    <button type="submit" id="send-btn" class="modern-send-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>

    </div>

    <!-- חלונות מודאל -->
    <div id="rename-modal" class="modal-overlay">
        <div class="modal-container">
            <h3 id="modal-rename-title">שנה שם שיחה</h3>
            <input type="text" id="rename-input" autocomplete="off">
            <div class="modal-footer">
                <button id="rename-cancel-btn" class="modal-btn btn-secondary">ביטול</button>
                <button id="rename-confirm-btn" class="modal-btn btn-primary">שמור</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-container border-danger">
            <h3 id="modal-delete-title">מחיקת שיחה</h3>
            <p id="modal-delete-text">האם אתה בטוח שברצונך למחוק את השיחה הזו לצמיתות?</p>
            <div class="modal-footer">
                <button id="delete-cancel-btn" class="modal-btn btn-secondary">ביטול</button>
                <button id="delete-confirm-btn" class="modal-btn btn-danger">מחק</button>
            </div>
        </div>
    </div>

    <div id="stats-modal" class="modal-overlay">
        <div class="modal-container">
            <h3 style="color: var(--color-blue);">📊 נתוני מערכת AgentP</h3>
            <p style="margin-bottom: 12px;">מצב חיבור סוכן: <strong>Active ReAct Turn</strong></p>
            <p style="margin-bottom: 12px;">זמן תגובה ממוצע מקומי: <strong>Gemma4 (0.42s)</strong></p>
            <p style="margin-bottom: 24px;">סטטוס מנוע חיפוש: <strong>DDGS Bypass OK</strong></p>
            <div class="modal-footer">
                <button id="stats-close-btn" class="modal-btn btn-primary">סגור</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
