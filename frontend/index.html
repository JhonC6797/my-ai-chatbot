<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentP - AI Agents Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark-theme">

    <div class="app-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="perry-head animate-breath">
                        <div class="hair-tuft"></div>
                        <div class="fedora">
                            <div class="fedora-top"></div>
                            <div class="fedora-brim"></div>
                        </div>
                        <div class="eyes-container">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="bill"></div>
                    </div>
                    <div class="logo">
                        <span class="logo-accent">Agent</span><span class="logo-p">P</span>
                    </div>
                </div>
            </div>

            <button class="new-chat-btn" id="new-chat-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                שיחה חדשה
            </button>

            <div class="history-section">
                <div class="history-label">שיחות אחרונות</div>
                <div class="history-list" id="history-list">
                    </div>
            </div>
        </aside>

        <main class="chat-container">
            <div class="model-selector-container">
                <div class="selector-wrapper">
                    <label for="model-select">מנוע אקטיבי:</label>
                    <select id="model-select">
                        <option value="openai">OpenAI (ענן - GPT-4o-mini)</option>
                        <option value="local">Ollama (מקומי - Gemma4)</option>
                    </select>
                </div>
                
                <div class="header-actions">
                    <button id="theme-toggle-btn" class="theme-toggle-btn" title="החלף מצב תצוגה">
                        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>
                        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>

                    <div class="agent-status-badge">
                        <span class="status-dot animate-pulse"></span>
                        סוכן חכם + חיפוש ברשת פעיל
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant-message">
                    היי! ברוך הבא ל-<strong>AgentP</strong>. אני מחובר כעת לאינטרנט בזמן אמת ומסוגל לבצע עבורך מחקרים, בדיקות ואוטומציות. מה התוכנית להיום?
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form">
                    <textarea id="user-input" placeholder="שאל את הסוכן או בקש חיפוש... (Enter לשליחה, Shift+Enter לשורה חדשה)" rows="1" autocomplete="off" required></textarea>
                    <button type="submit" id="send-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        שלח
                    </button>
                </form>
            </div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
