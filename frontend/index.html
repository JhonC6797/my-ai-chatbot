<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentPey - AI Agents Platform</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div class="app-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-accent">Agent</span>Pey
                </div>
            </div>

            <button class="new-chat-btn" id="new-chat-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                שיחה חדשה
            </button>

            <div class="history-section">
                <div class="history-label">שיחות אחרונות</div>
                <div class="history-list" id="history-list">
                    <!-- שיחות ייטענו כאן דינמית -->
                </div>
            </div>
        </aside>

        <main class="chat-container">
            <div class="model-selector-container">
                <div class="selector-wrapper">
                    <label for="model-select">מנוע אקטיבי:</label>
                    <select id="model-select">
                        <option value="openai">OpenAI (ענן - GPT-4o-mini)</option>
                        <option value="local">Ollama (מקומי - Gemma4)</option>
                    </select>
                </div>
                <!-- תגית סטטוס חדשה וצבעונית עבור הסוכן -->
                <div class="agent-status-badge">
                    <span class="status-dot animate-pulse"></span>
                    סוכן חכם + חיפוש ברשת פעיל
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant-message">
                    היי! ברוך הבא ל-<strong>AgentPey</strong>. אני מחובר כעת לאינטרנט בזמן אמת ומסוגל לבצע עבורך מחקרים, בדיקות ואוטומציות. מה התוכנית להיום?
                </div>
            </div>

            <div class="chat-input-container">
                <form id="chat-form">
                    <input type="text" id="user-input" placeholder="שאל את הסוכן או בקש חיפוש ברשת..." autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        שלח
                    </button>
                </form>
            </div>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
